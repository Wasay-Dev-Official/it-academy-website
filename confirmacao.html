<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">

<!-- Browser page title -->
<title>Confirmação</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* =========================
   PAGE BACKGROUND
   Animated gradient effect
========================= */
body {
    margin: 0;
    font-family: "Poppins", Arial, sans-serif;
    color: white;

    background: linear-gradient(270deg, #0f2027, #203a43, #2c5364, #1c92d1);
    background-size: 800% 800%;

    animation: bgMove 12s ease infinite;
}

/* Background animation */
@keyframes bgMove {

    0% {
        background-position: 0% 50%;
    }

    50% {
        background-position: 100% 50%;
    }

    100% {
        background-position: 0% 50%;
    }

}

/* =========================
   PAGE WRAPPER
   Centers content vertically
========================= */
.wrapper {
    display: flex;
    justify-content: center;
    align-items: flex-start;

    padding-top: 60px;
    padding-bottom: 60px;
}

/* =========================
   CONFIRMATION CARD
========================= */
.container {

    width: 90%;
    max-width: 750px;

    background: rgba(255,255,255,0.08);

    backdrop-filter: blur(15px);

    border-radius: 20px;
    padding: 35px;

    box-shadow: 0 15px 50px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.15);

    animation: fadeIn 0.8s ease;
}

/* Card entrance animation */
@keyframes fadeIn {

    from {
        opacity: 0;
        transform: translateY(20px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }

}

/* =========================
   PAGE TITLE
========================= */
h1 {
    text-align: center;
    margin-bottom: 25px;

    font-size: 30px;
    color: #ffffff;
}

/* =========================
   INFORMATION ROWS
========================= */
.row {

    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 12px 15px;
    margin-bottom: 8px;

    border-radius: 10px;

    background: rgba(255,255,255,0.05);

    border: 1px solid rgba(255,255,255,0.1);
}

/* Left side label */
.label {
    font-weight: 600;
    opacity: 0.85;
}

/* Right side value */
.value {

    text-align: right;

    max-width: 60%;
    word-wrap: break-word;

    opacity: 0.9;
}

/* =========================
   ACTION BUTTONS
========================= */
.actions {
    text-align: center;
    margin-top: 25px;
}

/* Main button style */
button {

    padding: 14px 25px;
    margin: 5px;

    border: none;
    border-radius: 12px;

    font-weight: 600;
    cursor: pointer;

    background: linear-gradient(135deg, #00c6ff, #0072ff);

    color: white;

    transition: 0.3s;
}

/* Button hover animation */
button:hover {

    transform: scale(1.08);

    box-shadow: 0 10px 30px rgba(0,198,255,0.4);
}

/* =========================
   PRINT SETTINGS
   Optimized layout for PDF
========================= */
@media print {

    body {
        background: white !important;
        color: black !important;
    }

    .wrapper {
        padding: 0;
        margin: 0;
    }

    .container {

        width: 100%;
        max-width: 100%;

        background: white !important;
        color: black !important;

        box-shadow: none;
        border: none;

        margin: 0;
        padding: 0;
    }

    .row {

        background: white !important;
        color: black !important;

        border: 1px solid #ccc;
    }

    .label,
    .value,
    h1 {
        color: black !important;
    }

    /* Hide buttons in PDF version */
    .actions {
        display: none;
    }

    /* Prevent empty second page */
    html,
    body {
        height: auto;
        overflow: hidden;
    }

    /* PDF page margins */
    @page {
        margin: 10mm;
    }

}

</style>
</head>

<body>

<!-- =========================
     MAIN PAGE WRAPPER
========================= -->
<div class="wrapper">

    <!-- Confirmation card -->
    <div class="container">

        <!-- Page title -->
        <h1>Inscrição Concluída</h1>

        <!-- User information appears here -->
        <div id="dados"></div>

        <!-- PDF download button -->
        <div class="actions">

            <button onclick="downloadAndReturn()">
                🖨 Guardar PDF
            </button>

        </div>

    </div>

</div>

<script>

/* =========================
   PRINT PDF AND REDIRECT
========================= */
function downloadAndReturn(){

    /* Open print dialog */
    window.print();

    /* Return to homepage after printing */
    setTimeout(() => {

        window.location.href = "index.html";

    }, 1000);

}

/* =========================
   READ URL PARAMETERS
========================= */
const params = new URLSearchParams(window.location.search);

/* =========================
   CREATE INFORMATION ROW
========================= */
function row(label, value){

    return `
    <div class="row">

        <div class="label">
            ${label}
        </div>

        <div class="value">
            ${value || "-"}
        </div>

    </div>
    `;
}

/* =========================
   DISPLAY USER DATA
========================= */
document.getElementById("dados").innerHTML = `

${row("Nome", params.get("nome"))}

${row("Email", params.get("email"))}

${row("Telefone", params.get("telefone"))}

${row("Curso", params.get("curso"))}

${row("Nível", params.get("nivel"))}

${row("Interesses", params.get("interesses"))}

${row("Experiência", params.get("experiencia"))}

${row("Data de Início", params.get("data_inicio"))}

${row("Disponibilidade", params.get("tempo"))}

${row("Objetivo", params.get("objetivo"))}

`;

</script>

</body>
</html>
