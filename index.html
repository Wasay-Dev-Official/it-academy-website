<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">

<!-- Website title shown in browser tab -->
<title>IT Academy</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* =========================
   PAGE BACKGROUND
   Animated gradient background
========================= */
body {
    margin: 0;
    font-family: "Poppins", Arial, sans-serif;
    color: white;
    overflow: hidden;

    background: linear-gradient(270deg, #0f2027, #203a43, #2c5364, #1b2735);
    background-size: 800% 800%;
    animation: bgMove 12s ease infinite;
}

/* Background animation */
@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Decorative glowing effect */
body::before {
    content: "";
    position: absolute;
    width: 400px;
    height: 400px;
    background: rgba(0, 198, 255, 0.15);
    filter: blur(120px);
    top: 10%;
    left: 10%;
    border-radius: 50%;
    animation: float 6s ease-in-out infinite;
}

/* Second glowing background effect */
body::after {
    content: "";
    position: absolute;
    width: 500px;
    height: 500px;
    background: rgba(44, 83, 100, 0.2);
    filter: blur(140px);
    bottom: 10%;
    right: 10%;
    border-radius: 50%;
    animation: float 8s ease-in-out infinite reverse;
}

/* Floating animation for glow effects */
@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(30px); }
    100% { transform: translateY(0px); }
}

/* =========================
   MAIN CONTAINER
   Centers content on screen
========================= */
.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    z-index: 2;
}

/* =========================
   HERO SECTION
   Main content card
========================= */
.hero {
    text-align: center;
    padding: 65px 55px;

    background: rgba(255, 255, 255, 0.07);
    backdrop-filter: blur(20px);

    border-radius: 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);

    border: 1px solid rgba(255,255,255,0.12);

    animation: fadeIn 1s ease;
    transition: 0.3s;
    max-width: 600px;
}

/* Hover effect for hero card */
.hero:hover {
    transform: translateY(-10px);
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
}

/* Fade-in animation */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Small top badge */
.badge {
    display: inline-block;
    padding: 6px 14px;
    margin-bottom: 18px;

    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;

    background: rgba(0,198,255,0.15);
    border: 1px solid rgba(0,198,255,0.3);
    border-radius: 20px;

    color: #00c6ff;
}

/* Main heading */
h1 {
    margin: 0;
    font-size: 42px;
    font-weight: 600;
    line-height: 1.2;

    text-shadow: 0 0 20px rgba(0,198,255,0.25);
}

/* Description text */
.desc {
    margin-top: 18px;
    font-size: 15px;
    opacity: 0.85;
    line-height: 1.9;

    max-width: 520px;
    margin-left: auto;
    margin-right: auto;
}

/* =========================
   BUTTON STYLE
========================= */
.btn {
    display: inline-block;
    margin-top: 30px;
    padding: 15px 32px;

    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;

    text-decoration: none;
    font-weight: 600;
    letter-spacing: 0.6px;

    border-radius: 14px;

    box-shadow: 0 12px 30px rgba(0,0,0,0.35);

    transition: 0.3s;
}

/* Button hover animation */
.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 18px 45px rgba(0,198,255,0.4);
}

</style>
</head>

<body>

<!-- Main page container -->
<div class="container">

    <!-- Hero content box -->
    <div class="hero">

      <!-- Small label -->
      <div class="badge">Plataforma de Formação</div>

      <!-- Main title -->
      <h1>💻 IT Academy</h1>

      <!-- Website description -->
      <p class="desc">
        Aprende tecnologia de forma simples e prática.<br>
        Explora diferentes áreas da programação.<br>
        Desenvolve competências com projetos reais.<br>
        Prepara-te para o mercado digital.
      </p>

      <!-- Navigation button -->
      <a href="Course_registration1.html" class="btn">
        Ver Cursos 🚀
      </a>

    </div>

</div>

</body>
</html>
